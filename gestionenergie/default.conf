server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Sert le frontend React
    location / {
        try_files $uri /index.html;
    }

    # Proxy pour le backend Lumen
    location /api/lumen {
        proxy_pass http://lumen-backend:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Content Security Policy corrigée pour autoriser fetch et médias
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://lumen-backend:9000; media-src 'self' data:; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";

    # Permet les WebSocket si besoin
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}