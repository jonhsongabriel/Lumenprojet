version: "3.9"

services:
  db:
    image: postgres:16
    container_name: lumen-postgres
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lumen-network
    restart: unless-stopped

  lumen-backend:
    build: ./lumen-backend
    container_name: lumen-backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - lumen-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lumen-nginx
    ports:
      - "80:80"
    volumes:
      - ./gestionenergie/build:/usr/share/nginx/html
      - ./gestionenergie/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - lumen-backend
    networks:
      - lumen-network
    restart: unless-stopped

  # 🔥 AJOUT ICI (DANS services)
  gestionenergie:
    build: ./gestionenergie
    ports:
      - "3000:3000"
    volumes:
      - ./gestionenergie:/app
    command: npm start
    networks:
      - lumen-network

networks:
  lumen-network:

volumes:
  pgdata: