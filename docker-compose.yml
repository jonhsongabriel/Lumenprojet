version: "3.9"

services:
  db:
    image: postgres:16
    container_name: lumen-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lumen-network

  backend:
    build: ./lumen-backend
    container_name: lumen-backend
    env_file:
      - .env
    ports:
      - "9000:9000"
    depends_on:
      - db
    networks:
      - lumen-network

  nginx:
    image: nginx:alpine
    container_name: lumen-nginx
    ports:
      - "80:80"
    volumes:
      - ./gestionenergie/build:/usr/share/nginx/html
      - ./gestionenergie/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - lumen-network

networks:
  lumen-network:

volumes:
  pgdata: