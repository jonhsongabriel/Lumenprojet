version: "3.9"

services:

  db:
    image: postgres:16
    container_name: lumen-postgres
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lumen-network
    restart: unless-stopped

  lumen-backend:
    build: ./lumen-backend
    container_name: lumen-backend
    env_file:
      - .env
    ports:
      - "9000:9000"
    depends_on:
      - db
    networks:
      - lumen-network
    restart: unless-stopped

  fastapi:
    build: ./fastapi
    container_name: fastapi
    ports:
      - "8000:8000"
    networks:
      - lumen-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lumen-nginx
    ports:
      - "80:80"
    volumes:
      - ./gestionenergie/build:/usr/share/nginx/html
      - ./gestionenergie/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - lumen-backend
      - fastapi
    networks:
      - lumen-network
    restart: unless-stopped

networks:
  lumen-network:

volumes:
  pgdata: